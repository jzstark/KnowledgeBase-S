server {
    listen 80 default_server;
    server_name swanny.laughtale.co.uk _;

    client_max_body_size 100m;   # 文件上传上限（PDF/Word/图片）

    # OpenClaw agent UI
    location = /agent {
        return 301 /agent/;
    }

    location /agent/ {
        proxy_pass http://host.docker.internal:18789/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }

    # 前端
    location / {
        proxy_pass http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # API（含 SSE 流式响应）
    location /api {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }
}

# LibreChat 子域名（独立 agent 聊天 UI，通过 kb-mcp 接入知识库）
# DNS：在 Cloudflare 添加 chat.laughtale.co.uk → 本机 IP（与 swanny / rss 相同）。
server {
    listen 80;
    server_name chat.laughtale.co.uk;

    client_max_body_size 100m;

    location / {
        proxy_pass http://librechat:3080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
    }
}
