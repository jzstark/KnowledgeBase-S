server {
    listen 80 default_server;
    server_name swanny.laughtale.co.uk _;

    client_max_body_size 100m;   # 文件上传上限（PDF/Word/图片）

    # OpenClaw agent UI
    location = /agent {
        return 301 /agent/;
    }

    location /agent/ {
        proxy_pass http://host.docker.internal:18789/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }

    # 前端
    location / {
        proxy_pass http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # API（含 SSE 流式响应）
    location /api {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # MCP（streamable-http）。入站鉴权在 kb-mcp 应用内做（MCP_STATIC_TOKEN）。
    # X-Forwarded-Proto 写死 https：Cloudflare Flexible 下 $scheme 是 http，
    # Phase 2 的 OAuth 元数据 URL 必须是 https，否则云端客户端拒绝。
    location /mcp {
        proxy_pass http://kb-mcp:7878;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }
}
