server {
    listen 80;
    server_name wechat2rss.laughtale.co.uk wechat2rss.swanny.laughtale.co.uk;

    resolver 127.0.0.11 valid=10s ipv6=off;
    set $wechat2rss_upstream http://wechat2rss:8080;

    location = /_auth {
        internal;
        proxy_pass http://api:8000/api/auth/me;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Cookie $http_cookie;
    }

    location /feed/ {
        proxy_pass $wechat2rss_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /img-proxy {
        proxy_pass $wechat2rss_upstream/img-proxy;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        auth_request /_auth;
        proxy_pass $wechat2rss_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }
}

server {
    listen 80 default_server;
    server_name swanny.laughtale.co.uk _;

    client_max_body_size 100m;   # 文件上传上限（PDF/Word/图片）
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $wechat2rss_upstream http://wechat2rss:8080;

    # OpenClaw agent UI
    location = /agent {
        return 301 /agent/;
    }

    location /agent/ {
        proxy_pass http://host.docker.internal:18789/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }

    location = /wechat2rss {
        return 301 https://wechat2rss.laughtale.co.uk/;
    }

    location = /_auth {
        internal;
        proxy_pass http://api:8000/api/auth/me;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Cookie $http_cookie;
    }

    location /wechat2rss/ {
        return 301 https://wechat2rss.laughtale.co.uk/;
    }

    location ~ ^/wechat2rss/(assets/|config$|list$|login/|add/|addurl$|del/|pause/|opml$) {
        auth_request /_auth;
        rewrite ^/wechat2rss/(.*)$ /$1 break;
        proxy_pass $wechat2rss_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }

    location ~ ^/wechat2rss/(feed/|img-proxy$) {
        rewrite ^/wechat2rss/(.*)$ /$1 break;
        proxy_pass $wechat2rss_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }

    # 前端
    location / {
        proxy_pass http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # API（含 SSE 流式响应）
    location /api {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }
}
