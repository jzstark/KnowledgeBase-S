services:
  postgres:
    volumes:
      - postgres_dev:/var/lib/postgresql/data

  api:
    build:
      context: ./services/api
    volumes:
      - ./services/api:/app
      - ./user_data:/app/user_data
      - ./config:/app/shared_config:ro
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      INGESTION_WORKER_URL: http://ingestion-worker:8001

  web:
    build:
      context: ./services/web
      target: dev
    volumes:
      - ./services/web:/app
      - web_next:/app/.next
    command: npm run dev
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development

  summarizer-worker:
    build:
      context: ./services/summarizer-worker
    volumes:
      - ./services/summarizer-worker:/app
    environment:
      API_BASE_URL: http://api:8000
      AUTH_PASSWORD: ${AUTH_PASSWORD}
    profiles: []

  ingestion-worker:
    build:
      context: ./services/ingestion-worker
    volumes:
      - ./services/ingestion-worker:/app
      - ./user_data:/app/user_data
      - ./config:/app/shared_config:ro
    environment:
      API_BASE_URL: http://api:8000
      CLAUDE_API_KEY: ${CLAUDE_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    expose:
      - "8001"
    profiles: []   # dev 模式不限制 profile，可直接 docker compose run

  feedback-worker:
    build:
      context: ./services/feedback-worker
    volumes:
      - ./services/feedback-worker:/app
      - ./config:/app/shared_config:ro
    environment:
      API_BASE_URL: http://api:8000
      CLAUDE_API_KEY: ${CLAUDE_API_KEY}
    expose:
      - "8002"
    profiles: []

  scheduler:
    profiles: ["disabled"]

  watchtower:
    profiles: ["disabled"]

volumes:
  postgres_dev:
  web_next:
