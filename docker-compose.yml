services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: app
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d app"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: ghcr.io/${GITHUB_OWNER:-owner}/api:latest
    build:
      context: ./services/api
    restart: unless-stopped
    volumes:
      - ./user_data:/app/user_data
      - ./config:/app/shared_config:ro
    environment:
      DATABASE_URL: ${DATABASE_URL}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      AUTH_PASSWORD: ${AUTH_PASSWORD}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_COOKIE_DOMAIN: ${AUTH_COOKIE_DOMAIN:-}
      INGESTION_WORKER_URL: http://ingestion-worker:8001
      FEEDBACK_WORKER_URL: http://feedback-worker:8002
      WECHAT2RSS_BASE_URL: ${WECHAT2RSS_BASE_URL:-https://rss.laughtale.co.uk/wechat-api}
      WECHAT2RSS_TOKEN: ${WECHAT2RSS_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')\""]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  web:
    image: ghcr.io/${GITHUB_OWNER:-owner}/web:latest
    build:
      context: ./services/web
    restart: unless-stopped
    environment:
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost}
      API_URL: http://api:8000
    depends_on:
      - api

  ingestion-worker:
    image: ghcr.io/${GITHUB_OWNER:-owner}/ingestion-worker:latest
    restart: unless-stopped
    volumes:
      - ./user_data:/app/user_data
      - ./config:/app/shared_config:ro
    environment:
      DATABASE_URL: ${DATABASE_URL}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      API_BASE_URL: http://api:8000
      WECHAT2RSS_BASE_URL: ${WECHAT2RSS_BASE_URL:-https://rss.laughtale.co.uk/wechat-api}
      WECHAT2RSS_FEED_BASE_URL: ${WECHAT2RSS_FEED_BASE_URL:-https://rss.laughtale.co.uk/wechat}
      WECHAT2RSS_TOKEN: ${WECHAT2RSS_TOKEN}
    expose:
      - "8001"
    depends_on:
      api:
        condition: service_healthy
      rsshub:
        condition: service_started
    profiles: ["workers"]

  summarizer-worker:
    image: ghcr.io/${GITHUB_OWNER:-owner}/summarizer-worker:latest
    build:
      context: ./services/summarizer-worker
    restart: unless-stopped
    environment:
      API_BASE_URL: http://api:8000
      AUTH_PASSWORD: ${AUTH_PASSWORD}
    depends_on:
      api:
        condition: service_healthy
    profiles: ["workers"]

  job-worker:
    image: ghcr.io/${GITHUB_OWNER:-owner}/api:latest
    build:
      context: ./services/api
    command: python job_worker.py
    restart: unless-stopped
    volumes:
      - ./user_data:/app/user_data
      - ./config:/app/shared_config:ro
    environment:
      DATABASE_URL: ${DATABASE_URL}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      AUTH_PASSWORD: ${AUTH_PASSWORD}
      AUTH_SECRET: ${AUTH_SECRET}
      USER_DATA_DIR: /app/user_data
    depends_on:
      api:
        condition: service_healthy
    profiles: ["workers"]

  feedback-worker:
    image: ghcr.io/${GITHUB_OWNER:-owner}/feedback-worker:latest
    build:
      context: ./services/feedback-worker
    restart: unless-stopped
    volumes:
      - ./user_data:/app/user_data
      - ./config:/app/shared_config:ro
    environment:
      DATABASE_URL: ${DATABASE_URL}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY}
      API_BASE_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy
    profiles: ["workers"]

  maintenance-worker:
    image: ghcr.io/${GITHUB_OWNER:-owner}/api:latest
    build:
      context: ./services/api
    command: python maintenance.py
    volumes:
      - ./user_data:/app/user_data
      - ./config:/app/shared_config:ro
    environment:
      DATABASE_URL: ${DATABASE_URL}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY}
      API_BASE_URL: http://api:8000
    depends_on:
      - api
    profiles: ["maintenance"]

  rsshub:
    image: diygod/rsshub:latest
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      DOCKER_API_VERSION: "1.41"
    command: --interval 3600

  # ── LibreChat 栈 ───────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    restart: unless-stopped
    command: ["--wiredTigerCacheSizeGB", "0.5"]
    volumes:
      - ./data/mongo:/data/db

  meilisearch:
    image: getmeili/meilisearch:v1.7
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - ./data/meili:/meili_data

  kb-mcp:
    image: ghcr.io/${GITHUB_OWNER:-owner}/kb-mcp:latest
    build:
      context: ./services/kb-mcp
    restart: unless-stopped
    environment:
      KB_API_BASE: http://api:8000
    depends_on:
      api:
        condition: service_healthy

  librechat:
    image: ghcr.io/danny-avila/librechat:v0.7.6
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    environment:
      HOST: 0.0.0.0
      PORT: 3080
      MONGO_URI: mongodb://mongodb:27017/LibreChat
      MEILI_HOST: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      JWT_SECRET: ${LIBRECHAT_JWT_SECRET}
      JWT_REFRESH_SECRET: ${LIBRECHAT_JWT_REFRESH_SECRET}
      CREDS_KEY: ${LIBRECHAT_CREDS_KEY}
      CREDS_IV: ${LIBRECHAT_CREDS_IV}
      DOMAIN_CLIENT: ${LIBRECHAT_DOMAIN_CLIENT:-https://chat.laughtale.co.uk}
      DOMAIN_SERVER: ${LIBRECHAT_DOMAIN_SERVER:-https://chat.laughtale.co.uk}
      ALLOW_REGISTRATION: "false"
      ALLOW_EMAIL_LOGIN: "true"
      ALLOW_SOCIAL_LOGIN: "false"
      ANTHROPIC_API_KEY: ${CLAUDE_API_KEY}
      ANTHROPIC_MODELS: claude-opus-4-7,claude-sonnet-4-6,claude-haiku-4-5-20251001
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODELS: gpt-4o,gpt-4o-mini
    volumes:
      - ./config/librechat.yaml:/app/librechat.yaml:ro
      - ./data/librechat/images:/app/client/public/images
      - ./data/librechat/logs:/app/api/logs
    depends_on:
      - mongodb
      - meilisearch
      - kb-mcp

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - web
      - api
      - librechat
