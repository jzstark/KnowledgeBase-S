version: 1.2.1
cache: true

interface:
  privacyPolicy:
    externalUrl: ''
  termsOfService:
    externalUrl: ''

mcpSettings:
  # 允许内网 docker 服务名作为 MCP server origin（默认 SSRF 保护会拒绝私网地址）
  allowedDomains:
    - kb-mcp
    - http://kb-mcp:7878
    - localhost

mcpServers:
  knowledgebase:
    type: sse
    url: http://kb-mcp:7878/sse
    timeout: 30000

# 模型清单与 API 密钥通过环境变量配置（见 docker-compose.yml 的 librechat 服务）：
#   ANTHROPIC_API_KEY, ANTHROPIC_MODELS
#   OPENAI_API_KEY, OPENAI_MODELS
# LibreChat 内置 provider 的 model 列表无法从 librechat.yaml 控制。
